{% extends 'base.html' %}

{% block head %}
<title>To Do List</title>
{% endblock %}

{% block body %}
<div class="content">
        <h1>To Do List</h1>
        <table>
                <tr>
                        <th>Task</th>
                        <th>Added</th>
                        <th>Actions</th>
                </tr>
                <tr>
                        <th>Content</th>
                        <th>Data</th>
                        <th>More</th>
                </tr>
        </table>

        <form action="">
                <input type="text" name="content" id="content">
                <input type="submit" value="Add Task" id="btn_Add">
        </form>
</div>
{% endblock %}
